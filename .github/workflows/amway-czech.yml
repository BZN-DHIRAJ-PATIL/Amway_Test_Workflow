name: Amway Czech Workflow

on:
  workflow_dispatch:

jobs:
  process:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '8'

      - name: Create Runtime Folders
        run: |
          mkdir -p Amway_Czech/INPUT
          mkdir -p Amway_Czech/OUTPUT
          mkdir -p Amway_Czech/SUCCESS
          mkdir -p Amway_Czech/FAILURE
          mkdir -p Amway_Czech/CONFIRMED_DUPLICATE
          mkdir -p Amway_Czech/Temp
          mkdir -p Amway_Czech/OUTPUT_COPY
          mkdir -p Amway_Czech/CopyOfEncryptedOutput
          mkdir -p Amway_Czech/AUDIT
          mkdir -p Amway_Czech/log
          mkdir -p Mail_Czech/Log

      - name: Make Scripts Executable
        run: |
          chmod +x Mail_Czech/Run.sh
          chmod +x Amway_Czech/CRun.sh

      - name: Run Mail Utility
        run: |
          cd Mail_Czech
          ./Run.sh

      - name: Debug File Locations
        if: always()
        run: |
          echo "========================================"
          echo "CURRENT DIRECTORY"
          echo "========================================"
          pwd

          echo ""
          echo "========================================"
          echo "AMWAY_CZECH CONTENT"
          echo "========================================"
          ls -R Amway_Czech || true

          echo ""
          echo "========================================"
          echo "MAIL_CZECH CONTENT"
          echo "========================================"
          ls -R Mail_Czech || true

          echo ""
          echo "========================================"
          echo "ALL CSV FILES"
          echo "========================================"
          find . -name "*.csv" || true

          echo ""
          echo "========================================"
          echo "ALL AUDIT FILES"
          echo "========================================"
          find . | grep AUDIT || true

          echo ""
          echo "========================================"
          echo "ALL SUCCESS FILES"
          echo "========================================"
          find . | grep SUCCESS || true

          echo ""
          echo "========================================"
          echo "ALL OUTPUT FILES"
          echo "========================================"
          find . | grep OUTPUT || true


      - name: Send Audit File Email
       uses: dawidd6/action-send-mail@v3
       with:
          server_address: smtp.office365.com
          server_port: 587
          username: ${{ secrets.MAIL_USER }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: Amway Czech Audit File
          to: testemail@byzan.com
          from: ${{ secrets.MAIL_USER }}
          body: Audit file generated successfully. Please find the attached audit file.
          attachments: Amway_Czech/AUDIT/*.csv

      - name: Upload Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: amway-results
          path: |
            Amway_Czech/OUTPUT/**
            Amway_Czech/SUCCESS/**
            Amway_Czech/FAILURE/**
            Amway_Czech/AUDIT/**
            Amway_Czech/log/**
